<!doctype html>
<html lang="en" class="dark scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F172A" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo192.png" />

    <title>CLASTAR INVESTMENT HUB | Digital Solutions & Student Finance</title>
    <meta name="description" content="Based in Dodoma, Clastar Investment Hub empowers the future through Clastar Technologies (IT services) and Clastar Microfinance (student loans)." />
    <meta name="keywords" content="clastar investment hub, clastar technologies, clastar microfinance, student loans tanzania, software development dodoma, university loans" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://clastarhub.com/" />
    <meta property="og:title" content="CLASTAR INVESTMENT HUB" />
    <meta property="og:description" content="Empowering students and businesses through digital innovation and financial support." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "CLASTAR INVESTMENT HUB",
        "url": "https://clastarhub.com",
        "logo": "https://clastarhub.com/logo.png",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+255657811904",
          "contactType": "customer service",
          "areaServed": "TZ",
          "availableLanguage": "English"
        },
        "description": "Empowering Tanzania's future through technology and student microfinance.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Dodoma",
          "addressCountry": "TZ"
        },
        "hasPart": [
          {
            "@type": "Organization",
            "name": "Clastar Technologies",
            "description": "Digital solutions, software development, and graphic design."
          },
          {
            "@type": "Organization",
            "name": "Clastar Microfinance",
            "description": "Financial support and loans for students in Tanzania."
          }
        ]
      }
    </script>
  </head>
  <body class="bg-[#0F172A] text-slate-200 antialiased selection:bg-accent-blue/30 selection:text-white overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
